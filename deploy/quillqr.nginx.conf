server {
    listen 80;
    listen [::]:80;

    server_name <SERVER_NAME>;

    client_max_body_size 64m;

    access_log /var/log/nginx/quillqr-access.log;
    error_log  /var/log/nginx/quillqr-error.log;

    location ^~ /static/ {
        alias <quillqr_path>/static/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Drop common secret/config probes.
    location ~* (^|/)\.env$ {
        return 444;
    }

    location ~* (^|/)(\.git|\.svn|\.hg)(/|$) {
        return 444;
    }

    location ~* ^/(api/)?(config|settings|env)$ {
        return 444;
    }

    location ~* ^/(backup|backups|old|temp|tmp)/ {
        return 444;
    }

    location ~* ^/\.streamlit/ {
        return 444;
    }

    location ~* ^/(wp-admin|wp-login\.php|xmlrpc\.php|phpmyadmin|vendor|composer\.json|composer\.lock) {
        return 444;
    }
}